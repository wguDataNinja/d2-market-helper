name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Copy product data to public/
        run: |
          mkdir -p web/public/data
          cp data/products/in_game_rune_values.json web/public/data/
          cp data/products/traderie_tools_prices.json web/public/data/
          cp data/products/rune_prices_legacy.json web/public/data/
          cp data/products/external_cash_prices.sample.json web/public/data/
          cp data/source_manifest.json web/public/data/
          cp data/rune_registry.json web/public/data/

      - name: Build
        run: npm run build
        working-directory: web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
